<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="static\logo.png">
    <title>Snake Guard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --danger: #e74c3c;
        }
        body { font-family: 'Sarabun', sans-serif; background: #f4f6f7; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .container { 
            background: white; width: 100%; max-width: 480px; 
            padding: 25px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
        }

        h2 { color: var(--primary); margin: 0 0 5px 0; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px; }

        .preview-box {
            width: 100%; height: 300px;
            background: #f8f9fa; border: 2px dashed #bdc3c7; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; margin-bottom: 20px;
        }
        
        #imagePreview, #videoPreview {
            width: 100%; height: 100%; object-fit: cover; display: none;
        }
        
        .placeholder-text { color: #bdc3c7; font-weight: bold; }

        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        
        .btn-icon {
            flex: 1; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px;
            background: white; cursor: pointer; color: var(--dark); font-weight: bold;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-icon:hover { background: #f1f2f6; border-color: var(--primary); color: var(--primary); }
        .btn-icon.active { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-scan {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: var(--dark); color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-scan:disabled { background: #95a5a6; cursor: not-allowed; }
        .btn-scan:hover:not(:disabled) { background: var(--primary); transform: translateY(-2px); }

        .result-card { 
            margin-top: 20px; padding: 20px; border-radius: 10px; 
            background: #e8f8f5; border-left: 5px solid var(--primary);
            text-align: left; display: none; 
        }
        .result-card-inner {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .result-info { flex: 1; }
        .result-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--primary);
            display: none;
        }
        .danger-high { color: var(--danger); font-weight: bold; }

        .loader { display: none; width: 24px; height: 24px; border: 3px solid #fff; border-bottom-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Autocomplete Dropdown */
        .suggestion-item { cursor: pointer; transition: background 0.2s, color 0.2s; }
        .suggestion-item:hover { background-color: #27ae60; color: white; }
        .suggestion-highlight { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Snake Guard AI</h2>
    <p>ถ่ายรูปหรืออัปโหลดเพื่อระบุชนิดงู</p>

    <div style="margin-bottom: 15px;">
        <input type="text" id="search-snake" list="snake-suggestions" 
               placeholder="พิมพ์ชื่องูที่นี่..." 
               style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box;">
        <datalist id="snake-suggestions"></datalist>
    </div>

    <div class="preview-box">
        <span class="placeholder-text" id="placeholder">เลือกรูป หรือ เปิดกล้อง</span>
        <img id="imagePreview" alt="Preview">
        <video id="videoPreview" autoplay playsinline></video>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <div class="input-group">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">
            📁 เลือกรูป
        </button>
        <input type="file" id="fileInput" accept="image/*" hidden onchange="handleFileSelect(this)">
        
        <button class="btn-icon" id="btnCamera" onclick="toggleCamera()">
            📷 เปิดกล้อง
        </button>
    </div>

    <button class="btn-scan" id="btnScan" onclick="handleSmartScan()">
        <span id="btnText">Scan Now</span>
        <div class="loader" id="loader"></div>
    </button>

    <div class="result-card" id="resultBox">
        <div class="result-card-inner">
            <div class="result-info">
                <h3 id="resSnake" style="margin: 0 0 10px 0; color: #2c3e50;"></h3>
                <p id="resTimestamp" style="color: #7f8c8d; font-size: 0.85rem; margin: 0 0 10px 0;"></p>
                <div><b>ชื่อไทย:</b> <span id="resThai">-</span></div>
                <div><b>ความมั่นใจของ AI:</b> <span id="resConf">-</span></div>
                <div><b>ระดับอันตราย:</b> <span id="resDanger">-</span></div>
                <div style="margin-top: 5px;"><b>ปฐมพยาบาล:</b> <span id="resAid">-</span></div>
                <div style="margin-top: 5px;"><b>ลักษณะทางกายภาพ:</b> <span id="resMorphology">-</span></div>
                <div id="resWarning" style="margin-top: 10px; color: var(--danger); font-weight: bold; display: none;"></div>
            </div>
            <img id="resSnakeImg" class="result-img" alt="Snake Image">
        </div>
        
        <div id="feedbackSection" style="margin-top: 15px; display: none; border-top: 1px solid #ccc; padding-top: 15px;">
            <textarea id="feedbackText" rows="3" placeholder="AI ทายถูกไหม? หรือมีข้อเสนอแนะอะไรให้เว็บเราบ้าง?" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit; resize: none;"></textarea>
            <button onclick="submitFeedback()" style="margin-top: 8px; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;">ส่งข้อเสนอแนะ</button>
        </div>

        <button id="btnSaveCard" style="background: var(--primary); color: white; border: none; border-radius: 8px; padding: 12px 20px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" onmouseover="this.style.boxShadow='0 4px 10px rgba(0,0,0,0.2)'" onmouseout="this.style.boxShadow='0 2px 5px rgba(0,0,0,0.1)'">💾 เซฟผลการสแกนเป็นรูปภาพ</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
